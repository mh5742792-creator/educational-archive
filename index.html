<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الروابط | البحث المتقدم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>رادار الروابط المفقودة</h1>
            <p>نظام استرداد آلي مدعوم بخوادم Google</p>
        </header>

        <main>
            <div class="control-panel">
                <button id="startBtn" class="btn primary">بدء الفحص الشامل</button>
                <button id="resetBtn" class="btn secondary">تصفير العداد</button>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="status-text">
                    <span id="percentage">0%</span> - <span id="statusMessage">في انتظار الأوامر...</span>
                </div>
            </div>

            <div id="resultBox" class="result-box hidden">
                <h3>النتيجة:</h3>
                <a id="finalLink" href="#" target="_blank"></a>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
